<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lou-Ann & Giulia</title>

<style>

:root{
    --cream:#F7EFE6;
    --orange:#D97732;
    --yellow:#E6A15A;
    --green:#8FA97D;
    --dark:#3A2F28;
}

html{
    scroll-behavior:smooth;
}

body{
    margin:0;
    overflow-x:hidden;
    font-family:"Helvetica Neue", Arial, sans-serif;
    background:var(--cream);
    color:var(--dark);
}

/* SECTIONS */

section{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:80px 20px;
    position:relative;
    overflow:hidden;
}

/* BLOBS */

.blob{
    position:absolute;
    border-radius:50%;
    opacity:.18;
    z-index:0;
}

.blob-orange{
    width:650px;
    height:650px;

    background:var(--orange);

    top:-300px;
    right:-250px;

    border-radius:
        60% 40% 45% 55% /
        45% 55% 45% 55%;
}

.blob-yellow{
    width:450px;
    height:450px;

    background:var(--yellow);

    bottom:-180px;
    left:-180px;

    border-radius:
        50% 50% 40% 60% /
        60% 40% 60% 40%;
}

.blob-green{
    width:280px;
    height:280px;

    background:var(--green);

    bottom:80px;
    right:-100px;

    border-radius:
        50% 50% 60% 40% /
        40% 60% 40% 60%;
}

.content{
    position:relative;
    z-index:2;

    width:100%;
    max-width:1200px;

    text-align:center;
}

/* TITLE */

h1{
    font-size:clamp(3rem,8vw,6rem);
    margin-bottom:20px;
    color:var(--dark);
}

p{
    max-width:800px;

    margin:auto;

    line-height:1.8;
    font-size:1.2rem;
}

/* PHOTOS */

.story-photo{

    width:min(90vw,1000px);

    border-radius:30px;

    margin-bottom:40px;

    box-shadow:
        0 20px 60px rgba(0,0,0,.15);
}
